services:
  proxy:
    image: nginx:alpine
    container_name: brobier-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: brobier-backend
    env_file:
      - ./.env
    environment:
      # Override host values from .env so the container reaches other services
      # by their Docker network names instead of localhost.
      DB_HOST: db-dev
      SMTP_HOST: mailpit
    ports:
      - "8000:8000"
    volumes:
      # Mount source for live reload during development.
      - ./backend/brobier:/app/brobier
    command:
      ["uvicorn", "brobier.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      db-dev:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: unless-stopped

  db-dev:
    image: postgres:18-alpine
    container_name: brobier-db-dev
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${DB_NAME:-brobier_dev}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db-dev-data:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_ADMIN_USER -d $$DB_NAME"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    volumes:
        - ./data:/data
    ports:
        - "8025:8025"
        - "1025:1025"
    environment:
        MP_MAX_MESSAGES: 5000
        MP_DATABASE: /data/mailpit.db
        MP_SMTP_AUTH_ACCEPT_ANY: 1
        MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  db-dev-data:
