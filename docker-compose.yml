services:
  proxy:
    image: nginx:alpine
    container_name: brobier-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  db-dev:
    image: postgres:18-alpine
    container_name: brobier-db-dev
    environment:
      POSTGRES_DB: brobier_dev
      POSTGRES_USER: ${DB_USER:-brobier}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-brobier_dev}
    ports:
      - "5432:5432"
    volumes:
      - db-dev-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-brobier} -d brobier_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    volumes:
        - ./data:/data
    ports:
        - "8025:8025"
        - "1025:1025"
    environment:
        MP_MAX_MESSAGES: 5000
        MP_DATABASE: /data/mailpit.db
        MP_SMTP_AUTH_ACCEPT_ANY: 1
        MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  db-dev-data:
